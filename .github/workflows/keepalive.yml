name: Keep backend awake

# Render's free tier sleeps a web service after ~15 min without inbound traffic.
# This scheduled job pings the health endpoint every 10 minutes so the API stays
# warm (and cold starts don't slow down the demo). A single always-on free
# service fits within Render's 750 instance-hours/month.

on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes (UTC)
  workflow_dispatch: {} # allow manual runs from the Actions tab

# The public health URL. Override by setting a repo variable HEALTH_URL
# (Settings -> Secrets and variables -> Actions -> Variables) if the backend
# URL ever changes.
env:
  HEALTH_URL: ${{ vars.HEALTH_URL || 'https://airbnb-clone-api-obpg.onrender.com/api/health' }}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint (retry while Render wakes)
        run: |
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "$HEALTH_URL") || code=000
            echo "attempt $i -> HTTP $code"
            if [ "$code" = "200" ]; then
              echo "backend is awake"
              exit 0
            fi
            sleep 30
          done
          echo "health check did not return 200"
          exit 1
